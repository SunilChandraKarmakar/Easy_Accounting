<nz-breadcrumb>
  <nz-breadcrumb-item>Product & Service</nz-breadcrumb-item>
    <nz-breadcrumb-item><a routerLink="/app/categories" class="breadcrumb-link">Category</a></nz-breadcrumb-item>
  <nz-breadcrumb-item>Create Category</nz-breadcrumb-item>
</nz-breadcrumb>
<div class="row mt-3">
  <div class="col-md-12">
    <div class="card shadow-lg">
      <div class="card-header">
        <h5 class="card-title text-center">Create Category</h5>
      </div>
      <div class="card-body">
        <form class="row g-3" autocomplete="off">
          <div class="col-md-3">
            <label for="name" class="form-label">Name <span class="text-danger fw-bold">*</span></label>
            <nz-input-wrapper>
              <nz-icon nzInputPrefix nzType="home" />
              <input nz-input placeholder="Enter category name" nzSize="default" id="name" name="name" 
                [(ngModel)]="categoryCreateModel.name" />
            </nz-input-wrapper>
          </div>  
          <div class="col-md-3">
            <label for="parentId" class="form-label">Parent Category</label>
             <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Select a Parent Category" 
              [(ngModel)]="categoryCreateModel.parentId" name="parentId" style="width: 100%;">
                @for (parentCategory of parentCategories; track parentCategory.id) {
                  <nz-option [nzValue]="parentCategory.id" [nzLabel]="parentCategory.name!"></nz-option>
                }
              </nz-select>
          </div>  
          <div class="col-md-3">
            <label for="companyId" class="form-label">Company <span class="text-danger fw-bold">*</span></label>
             <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Select a Company" 
              [(ngModel)]="categoryCreateModel.companyId" name="countryId" style="width: 100%;">
                @for (company of companies; track company.id) {
                  <nz-option [nzValue]="company.id" [nzLabel]="company.name!"></nz-option>
                }
              </nz-select>
          </div>  
        </form>
      </div>
      <div class="card-footer text-end">
        <button 
          nz-button 
          nzType="primary" 
          class="btn-save" 
          (click)="onClickSaveCategory()"
          *appCheckPermission="{ feature: 'Category', action: 'Create' }">
            <nz-icon nzType="save" nzTheme="outline" />
          Save
        </button>
        <button nz-button nzType="primary" class="btn-cancel" routerLink="/app/categories">
          <nz-icon nzType="close" nzTheme="outline" />
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple">
  <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
