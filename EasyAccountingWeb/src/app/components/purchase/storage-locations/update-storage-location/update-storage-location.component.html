<nz-breadcrumb>
  <nz-breadcrumb-item>Purchase</nz-breadcrumb-item>
    <nz-breadcrumb-item><a routerLink="/app/storage-locations" class="breadcrumb-link">Storage Location</a></nz-breadcrumb-item>
  <nz-breadcrumb-item>Update Storage Location</nz-breadcrumb-item>
</nz-breadcrumb>
<div class="row mt-3">
  <div class="col-md-12">
    <div class="card shadow-lg">
      <div class="card-header">
        <h5 class="card-title text-center">Update Storage Location</h5>
      </div>
      <div class="card-body">
        <form class="row g-3" autocomplete="off">
          <div class="col-md-3">
            <label for="name" class="form-label">Name <span class="text-danger fw-bold">*</span></label>
            <nz-input-wrapper>
              <nz-icon nzInputPrefix nzType="home" />
              <input nz-input placeholder="Enter storage location name" nzSize="default" id="name" name="name" 
                [(ngModel)]="storageLocationUpdateModel.name" />
            </nz-input-wrapper>
          </div>  
          <div class="col-md-3">
            <label for="companyId" class="form-label">Company <span class="text-danger fw-bold">*</span></label>
             <nz-select nzShowSearch nzAllowClear nzPlaceHolder="Select a Company" 
              [(ngModel)]="storageLocationUpdateModel.companyId" name="countryId" style="width: 100%;">
                @for (company of companies; track company.id) {
                  <nz-option [nzValue]="company.id" [nzLabel]="company.name!"></nz-option>
                }
              </nz-select>
          </div>  
          <div class="col-md-3">
            <label for="capacity" class="form-label">Capacity </label>
            <nz-input-wrapper>
              <nz-icon nzInputPrefix nzType="calculator" />
              <input nz-input placeholder="Enter storage location capacity" nzSize="default" id="capacity" name="capacity" 
                [(ngModel)]="storageLocationUpdateModel.capacity" />
            </nz-input-wrapper>
          </div>  
          <div class="col-md-9">
            <label for="description" class="form-label">Description</label>
            <nz-textarea-count [nzMaxCharacterCount]="500">
              <textarea rows="4" id="description" name="description" placeholder="Enter storage location description" 
              [(ngModel)]="storageLocationUpdateModel.description" nz-input></textarea>
            </nz-textarea-count>
          </div> 
        </form>
      </div>
      <div class="card-footer text-end">
        <button 
          nz-button 
          nzType="primary" 
          class="btn-save" 
          (click)="onClickUpdateStorageLocation()"
          *appCheckPermission="{ feature: 'Storage Location', action: 'Update' }">
          <nz-icon nzType="save" nzTheme="outline" />
          Update
        </button>
        <button nz-button nzType="primary" class="btn-cancel" routerLink="/app/storage-locations">
          <nz-icon nzType="close" nzTheme="outline" />
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple">
  <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
